    resources:
    - path: /v1/servers
      name: servers
      description: REST surface for servers.
      operations:
      - method: GET
        name: listservers
        description: List Servers
        call: hetzner-servers.listservers
        with:
          name: rest.name
          label_selector: rest.label_selector
          sort: rest.sort
          status: rest.status
          page: rest.page
          per_page: rest.per_page
        outputParameters:
        - type: object
          mapping: $.
