    baseUri: https://api.hetzner.cloud/v1
    description: Hetzner Cloud API — Servers business capability. Self-contained, no shared references.
    resources:
    - name: servers
      path: /servers
      operations:
      - name: listservers
        method: GET
        description: List Servers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Filter resources by their name.
        - name: label_selector
          in: query
          type: string
          description: Filter resources by labels.
        - name: sort
          in: query
          type: array
          description: Sort resources by field and direction. May be used multiple times.
        - name: status
          in: query
          type: array
          description: Filter resources by status. May be used multiple times.
        - name: page
          in: query
          type: integer
          description: Page number to return. For more information, see "[Pagination](#description/pagination)".
        - name: per_page
          in: query
          type: integer
          description: Maximum number of entries returned per page. For more information, see "[Pagination](#description/pagination)".
      - name: createserver
        method: POST
        description: Create a Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: servers-id
      path: /servers/{id}
      operations:
      - name: getserver
        method: GET
        description: Get a Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the Server.
          required: true
      - name: updateserver
        method: PUT
        description: Update a Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the Server.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteserver
        method: DELETE
        description: Delete a Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the Server.
          required: true
    - name: servers-id-metrics
      path: /servers/{id}/metrics
      operations:
      - name: getservermetrics
        method: GET
        description: Get Metrics for a Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the Server.
          required: true
        - name: type
          in: query
          type: array
          description: Type of metrics to get.
          required: true
        - name: start
          in: query
          type: string
          description: Start of period to get Metrics for (must be in [RFC3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6)
            format).
          required: true
        - name: end
          in: query
          type: string
          description: End of period to get Metrics for (must be in [RFC3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6)
            format).
          required: true
        - name: step
          in: query
          type: string
          description: Resolution of results in seconds.
    authentication:
      type: bearer
      token: '{{env.HETZNER_API_KEY}}'
  exposes:
