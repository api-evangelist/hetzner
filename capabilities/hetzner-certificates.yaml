naftiko: 1.0.0-alpha2
info:
  label: Hetzner Cloud API — Certificates
  description: 'Hetzner Cloud API — Certificates. 5 operations. Lead operation: List Certificates. Self-contained Naftiko
    capability covering one Hetzner business surface.'
  tags:
  - Hetzner
  - Certificates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HETZNER_API_KEY: HETZNER_API_KEY
capability:
  consumes:
  - type: http
    namespace: hetzner-certificates
    baseUri: https://api.hetzner.cloud/v1
    description: Hetzner Cloud API — Certificates business capability. Self-contained, no shared references.
    resources:
    - name: certificates
      path: /certificates
      operations:
      - name: listcertificates
        method: GET
        description: List Certificates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sort
          in: query
          type: array
          description: Sort resources by field and direction. May be used multiple times.
        - name: name
          in: query
          type: string
          description: Filter resources by their name.
        - name: label_selector
          in: query
          type: string
          description: Filter resources by labels.
        - name: type
          in: query
          type: array
          description: Filter resources by type. May be used multiple times.
        - name: page
          in: query
          type: integer
          description: Page number to return. For more information, see "[Pagination](#description/pagination)".
        - name: per_page
          in: query
          type: integer
          description: Maximum number of entries returned per page. For more information, see "[Pagination](#description/pagination)".
      - name: createcertificate
        method: POST
        description: Create a Certificate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: certificates-id
      path: /certificates/{id}
      operations:
      - name: getcertificate
        method: GET
        description: Get a Certificate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the Certificate.
          required: true
      - name: updatecertificate
        method: PUT
        description: Update a Certificate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the Certificate.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletecertificate
        method: DELETE
        description: Delete a Certificate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the Certificate.
          required: true
    authentication:
      type: bearer
      token: '{{env.HETZNER_API_KEY}}'
  exposes:
  - type: rest
    namespace: hetzner-certificates-rest
    port: 8080
    description: REST adapter for Hetzner Cloud API — Certificates. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/certificates
      name: certificates
      description: REST surface for certificates.
      operations:
      - method: GET
        name: listcertificates
        description: List Certificates
        call: hetzner-certificates.listcertificates
        with:
          sort: rest.sort
          name: rest.name
          label_selector: rest.label_selector
          type: rest.type
          page: rest.page
          per_page: rest.per_page
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcertificate
        description: Create a Certificate
        call: hetzner-certificates.createcertificate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/certificates/{id}
      name: certificates-id
      description: REST surface for certificates-id.
      operations:
      - method: GET
        name: getcertificate
        description: Get a Certificate
        call: hetzner-certificates.getcertificate
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatecertificate
        description: Update a Certificate
        call: hetzner-certificates.updatecertificate
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecertificate
        description: Delete a Certificate
        call: hetzner-certificates.deletecertificate
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hetzner-certificates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Hetzner Cloud API — Certificates. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-certificates
      description: List Certificates
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hetzner-certificates.listcertificates
      with:
        sort: tools.sort
        name: tools.name
        label_selector: tools.label_selector
        type: tools.type
        page: tools.page
        per_page: tools.per_page
      outputParameters:
      - type: object
        mapping: $.
    - name: create-certificate
      description: Create a Certificate
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: hetzner-certificates.createcertificate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-certificate
      description: Get a Certificate
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hetzner-certificates.getcertificate
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-certificate
      description: Update a Certificate
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: hetzner-certificates.updatecertificate
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-certificate
      description: Delete a Certificate
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: hetzner-certificates.deletecertificate
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
