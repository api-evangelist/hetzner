      operations:
      - name: getfirewall
        method: GET
        description: Get a Firewall
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the Firewall.
          required: true
      - name: updatefirewall
        method: PUT
        description: Update a Firewall
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the Firewall.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletefirewall
        method: DELETE
        description: Delete a Firewall
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the Firewall.
          required: true
