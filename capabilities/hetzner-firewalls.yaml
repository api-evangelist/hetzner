    resources:
    - path: /v1/firewalls
      name: firewalls
      description: REST surface for firewalls.
      operations:
      - method: GET
        name: listfirewalls
        description: List Firewalls
        call: hetzner-firewalls.listfirewalls
        with:
          sort: rest.sort
          name: rest.name
          label_selector: rest.label_selector
          page: rest.page
          per_page: rest.per_page
        outputParameters:
        - type: object
          mapping: $.
