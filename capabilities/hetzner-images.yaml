naftiko: 1.0.0-alpha2
info:
  label: Hetzner Cloud API — Images
  description: 'Hetzner Cloud API — Images. 4 operations. Lead operation: List Images. Self-contained Naftiko capability covering
    one Hetzner business surface.'
  tags:
  - Hetzner
  - Images
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HETZNER_API_KEY: HETZNER_API_KEY
capability:
  consumes:
  - type: http
    namespace: hetzner-images
    baseUri: https://api.hetzner.cloud/v1
    description: Hetzner Cloud API — Images business capability. Self-contained, no shared references.
    resources:
    - name: images
      path: /images
      operations:
      - name: listimages
        method: GET
        description: List Images
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sort
          in: query
          type: array
          description: Sort resources by field and direction. May be used multiple times.
        - name: type
          in: query
          type: array
          description: Filter resources by type. May be used multiple times.
        - name: status
          in: query
          type: array
          description: Filter resources by status. May be used multiple times.
        - name: bound_to
          in: query
          type: array
          description: Filter Images by their linked Server ID. May be used multiple times.
        - name: include_deprecated
          in: query
          type: boolean
          description: Include deprecated Images.
        - name: name
          in: query
          type: string
          description: Filter resources by their name.
        - name: label_selector
          in: query
          type: string
          description: Filter resources by labels.
        - name: architecture
          in: query
          type: string
          description: Filter resources by cpu architecture.
        - name: page
          in: query
          type: integer
          description: Page number to return. For more information, see "[Pagination](#description/pagination)".
        - name: per_page
          in: query
          type: integer
          description: Maximum number of entries returned per page. For more information, see "[Pagination](#description/pagination)".
    - name: images-id
      path: /images/{id}
      operations:
      - name: getimage
        method: GET
        description: Get an Image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the Image.
          required: true
      - name: updateimage
        method: PUT
        description: Update an Image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the Image.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteimage
        method: DELETE
        description: Delete an Image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the Image.
          required: true
    authentication:
      type: bearer
      token: '{{env.HETZNER_API_KEY}}'
  exposes:
  - type: rest
    namespace: hetzner-images-rest
    port: 8080
    description: REST adapter for Hetzner Cloud API — Images. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/images
      name: images
      description: REST surface for images.
      operations:
      - method: GET
        name: listimages
        description: List Images
        call: hetzner-images.listimages
        with:
          sort: rest.sort
          type: rest.type
          status: rest.status
          bound_to: rest.bound_to
          include_deprecated: rest.include_deprecated
          name: rest.name
          label_selector: rest.label_selector
          architecture: rest.architecture
          page: rest.page
          per_page: rest.per_page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/images/{id}
      name: images-id
      description: REST surface for images-id.
      operations:
      - method: GET
        name: getimage
        description: Get an Image
        call: hetzner-images.getimage
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateimage
        description: Update an Image
        call: hetzner-images.updateimage
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteimage
        description: Delete an Image
        call: hetzner-images.deleteimage
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hetzner-images-mcp
    port: 9090
    transport: http
    description: MCP adapter for Hetzner Cloud API — Images. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-images
      description: List Images
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hetzner-images.listimages
      with:
        sort: tools.sort
        type: tools.type
        status: tools.status
        bound_to: tools.bound_to
        include_deprecated: tools.include_deprecated
        name: tools.name
        label_selector: tools.label_selector
        architecture: tools.architecture
        page: tools.page
        per_page: tools.per_page
      outputParameters:
      - type: object
        mapping: $.
    - name: get-image
      description: Get an Image
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hetzner-images.getimage
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-image
      description: Update an Image
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: hetzner-images.updateimage
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-image
      description: Delete an Image
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: hetzner-images.deleteimage
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
