        idempotent: true
      call: hetzner-zones.deletezone
      with:
        id_or_name: tools.id_or_name
      outputParameters:
      - type: object
        mapping: $.
    - name: export-zone-file
      description: Export a Zone file
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hetzner-zones.getzonezonefile
      with:
        id_or_name: tools.id_or_name
      outputParameters:
      - type: object
        mapping: $.
