naftiko: 1.0.0-alpha2
info:
  label: Hetzner Cloud API — Zones
  description: 'Hetzner Cloud API — Zones. 6 operations. Lead operation: List Zones. Self-contained Naftiko capability covering
    one Hetzner business surface.'
  tags:
  - Hetzner
  - Zones
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HETZNER_API_KEY: HETZNER_API_KEY
capability:
  consumes:
  - type: http
    namespace: hetzner-zones
    baseUri: https://api.hetzner.cloud/v1
    description: Hetzner Cloud API — Zones business capability. Self-contained, no shared references.
    resources:
    - name: zones
      path: /zones
      operations:
      - name: listzones
        method: GET
        description: List Zones
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Filter resources by their name.
        - name: mode
          in: query
          type: string
          description: Filter resources by their mode.
        - name: label_selector
          in: query
          type: string
          description: Filter resources by labels.
        - name: sort
          in: query
          type: array
          description: Sort resources by field and direction. May be used multiple times.
        - name: page
          in: query
          type: integer
          description: Page number to return. For more information, see "[Pagination](#description/pagination)".
        - name: per_page
          in: query
          type: integer
          description: Maximum number of entries returned per page. For more information, see "[Pagination](#description/pagination)".
      - name: createzone
        method: POST
        description: Create a Zone
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: zones-id_or_name
      path: /zones/{id_or_name}
      operations:
      - name: getzone
        method: GET
        description: Get a Zone
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id_or_name
          in: path
          type: string
          description: ID or Name of the Zone.
          required: true
      - name: updatezone
        method: PUT
        description: Update a Zone
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id_or_name
          in: path
          type: string
          description: ID or Name of the Zone.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletezone
        method: DELETE
        description: Delete a Zone
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id_or_name
          in: path
          type: string
          description: ID or Name of the Zone.
          required: true
    - name: zones-id_or_name-zonefile
      path: /zones/{id_or_name}/zonefile
      operations:
      - name: getzonezonefile
        method: GET
        description: Export a Zone file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id_or_name
          in: path
          type: string
          description: ID or Name of the Zone.
          required: true
    authentication:
      type: bearer
      token: '{{env.HETZNER_API_KEY}}'
  exposes:
  - type: rest
    namespace: hetzner-zones-rest
    port: 8080
    description: REST adapter for Hetzner Cloud API — Zones. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/zones
      name: zones
      description: REST surface for zones.
      operations:
      - method: GET
        name: listzones
        description: List Zones
        call: hetzner-zones.listzones
        with:
          name: rest.name
          mode: rest.mode
          label_selector: rest.label_selector
          sort: rest.sort
          page: rest.page
          per_page: rest.per_page
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createzone
        description: Create a Zone
        call: hetzner-zones.createzone
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/zones/{id-or-name}
      name: zones-id-or-name
      description: REST surface for zones-id_or_name.
      operations:
      - method: GET
        name: getzone
        description: Get a Zone
        call: hetzner-zones.getzone
        with:
          id_or_name: rest.id_or_name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatezone
        description: Update a Zone
        call: hetzner-zones.updatezone
        with:
          id_or_name: rest.id_or_name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletezone
        description: Delete a Zone
        call: hetzner-zones.deletezone
        with:
          id_or_name: rest.id_or_name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/zones/{id-or-name}/zonefile
      name: zones-id-or-name-zonefile
      description: REST surface for zones-id_or_name-zonefile.
      operations:
      - method: GET
        name: getzonezonefile
        description: Export a Zone file
        call: hetzner-zones.getzonezonefile
        with:
          id_or_name: rest.id_or_name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hetzner-zones-mcp
    port: 9090
    transport: http
    description: MCP adapter for Hetzner Cloud API — Zones. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-zones
      description: List Zones
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hetzner-zones.listzones
      with:
        name: tools.name
        mode: tools.mode
        label_selector: tools.label_selector
        sort: tools.sort
        page: tools.page
        per_page: tools.per_page
      outputParameters:
      - type: object
        mapping: $.
    - name: create-zone
      description: Create a Zone
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: hetzner-zones.createzone
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-zone
      description: Get a Zone
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hetzner-zones.getzone
      with:
        id_or_name: tools.id_or_name
      outputParameters:
      - type: object
        mapping: $.
    - name: update-zone
      description: Update a Zone
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: hetzner-zones.updatezone
      with:
        id_or_name: tools.id_or_name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-zone
      description: Delete a Zone
      hints:
        readOnly: false
