naftiko: 1.0.0-alpha2
info:
  label: Hetzner Cloud API — Actions
  description: 'Hetzner Cloud API — Actions. 2 operations. Lead operation: Get multiple Actions. Self-contained Naftiko capability
    covering one Hetzner business surface.'
  tags:
  - Hetzner
  - Actions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HETZNER_API_KEY: HETZNER_API_KEY
capability:
  consumes:
  - type: http
    namespace: hetzner-actions
    baseUri: https://api.hetzner.cloud/v1
    description: Hetzner Cloud API — Actions business capability. Self-contained, no shared references.
    resources:
    - name: actions
      path: /actions
      operations:
      - name: getactions
        method: GET
        description: Get multiple Actions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: array
          description: Filter the actions by ID. May be used multiple times.
          required: true
    - name: actions-id
      path: /actions/{id}
      operations:
      - name: getaction
        method: GET
        description: Get an Action
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: ID of the Action.
          required: true
    authentication:
      type: bearer
      token: '{{env.HETZNER_API_KEY}}'
  exposes:
  - type: rest
    namespace: hetzner-actions-rest
    port: 8080
    description: REST adapter for Hetzner Cloud API — Actions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/actions
      name: actions
      description: REST surface for actions.
      operations:
      - method: GET
        name: getactions
        description: Get multiple Actions
        call: hetzner-actions.getactions
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/actions/{id}
      name: actions-id
      description: REST surface for actions-id.
      operations:
      - method: GET
        name: getaction
        description: Get an Action
        call: hetzner-actions.getaction
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hetzner-actions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Hetzner Cloud API — Actions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-multiple-actions
      description: Get multiple Actions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hetzner-actions.getactions
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-action
      description: Get an Action
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hetzner-actions.getaction
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
