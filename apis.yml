aid: hetzner
name: Hetzner
description: Hetzner Online is a German hosting provider offering cloud servers, dedicated servers, and domain services. Hetzner
  provides a Cloud API for programmatic management of cloud resources, as well as a DNS API for managing DNS zones and records.
